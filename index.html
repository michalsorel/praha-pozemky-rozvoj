<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pozemky města v rozvojových plochách</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #map { position: absolute; inset: 0; }
  .panel {
    background: rgba(255,255,255,0.94); padding: 10px 12px; border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.3); font-size: 13px; color: #111; line-height: 1.35;
  }
  .panel h1 { font-size: 14px; margin: 0 0 6px; }
  .panel select { width: 100%; padding: 4px; font-size: 13px; margin-top: 4px; }
  .legend i { display: inline-block; width: 14px; height: 14px; margin-right: 6px; vertical-align: -2px; border: 1px solid rgba(0,0,0,0.35); }
  .legend div { margin: 3px 0; }
  .muted { color: #555; font-size: 12px; }
  .controls label { display: block; margin: 2px 0; cursor: pointer; white-space: nowrap; }
  .controls input { margin-right: 6px; vertical-align: -1px; }
  .controls hr { border: none; border-top: 1px solid rgba(0,0,0,0.18); margin: 6px 0; }
  /* schovávací panel: malý stejně velký pásek (tab) + tělo, rozbaluje se svisle.
     Tělo je vždy nad páskem → při vysunutí je pásek POD oknem (na mobilu na dosah
     palce, dá se jedním pohybem zasunout). Po sbalení zůstane u okraje jen pásek. */
  .dock { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .dock-tab {
    flex: 0 0 auto; height: 30px; min-width: 96px; padding: 0 12px; border: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap;
    background: rgba(255,255,255,0.94); color: #222; font-size: 13px; font-weight: 600;
    box-shadow: 0 1px 6px rgba(0,0,0,0.3); border-radius: 8px;
  }
  .dock-tab .ar { font-size: 11px; line-height: 1; }
  /* šipka podle směru vysunutí a stavu: dole zasunuté ▲ / vysunuté ▼, nahoře obráceně */
  .dock-bottom.collapsed     .dock-tab .ar::before { content: "\25B2"; }
  .dock-bottom:not(.collapsed) .dock-tab .ar::before { content: "\25BC"; }
  .dock-top.collapsed        .dock-tab .ar::before { content: "\25BC"; }
  .dock-top:not(.collapsed)  .dock-tab .ar::before { content: "\25B2"; }
  .dock-body { border-radius: 8px; max-width: min(80vw, 300px); max-height: 76vh; overflow: auto; }
  .dock.collapsed .dock-body { display: none; }
  .locate-ctrl a { display: flex; align-items: center; justify-content: center; }
  .locate-ctrl svg { display: block; }
  .locate-ctrl a.locating { opacity: 0.45; }
  .leaflet-tooltip.parc { font-size: 12px; line-height: 1.3; }
  a { color: #1a5fb4; }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
/* ---------- barvy ---------- */
const BARVA_TR = { "obytná": "#e06666", "produkční": "#3366cc", "rekreační": "#f4c40c", "přírodní": "#2e8b57", "nestanoveno": "#c9a24b" };
const BARVA_VLASTNI = "#1f6feb";      // nesvěřeno, hl. m. Praha 100 % (modrá)
const BARVA_SPOLU = "#8438d6";        // nesvěřeno, spoluvlastnictví (fialová)
const BARVA_SVERENO = "#e8730c";      // svěřeno MČ, 100 % (oranžová)
const BARVA_SVERENO_SPOLU = "#b5216b"; // svěřeno MČ, spoluvlastnictví (magenta - teplá, k fialové, ale daleko od BARVA_SPOLU i BARVA_MC)
const BARVA_MC = "#ff1f8f";           // hranice MČ (výrazná, univerzální)
const BARVA_STAT = "#fa3636";         // majetek státu (ČR) - červená z originální služby

const map = L.map("map", { preferCanvas: true }).setView([50.08, 14.44], 11);

/* Pořadí vrstev řešíme panes (funguje i při pozdějším líném načtení kontextu):
   pozadí (T/R plochy + kontext veškerý majetek) < průnik s T/R (sytě) < hranice MČ.
   Nepodkladové panes s pointer-events:none nechají klikat skrz na interaktivní. */
[["pBg", 410, true], ["pSrv", 418, true], ["pFg", 420, false], ["pTop", 430, true]].forEach(([n, z, noEvt]) => {
  map.createPane(n);
  map.getPane(n).style.zIndex = z;
  if (noEvt) map.getPane(n).style.pointerEvents = "none";
});
const rBg = L.canvas({ pane: "pBg", padding: 0.5 });   // T/R + kontext (neinteraktivní)
const rFg = L.canvas({ pane: "pFg", padding: 0.5 });   // majetek v T/R (interaktivní)
const rTop = L.canvas({ pane: "pTop", padding: 0.5 }); // hranice MČ

/* ---------- podklady ---------- */
const ortofoto = L.tileLayer.wms("https://ags.cuzk.cz/arcgis1/services/ORTOFOTO/MapServer/WMSServer", {
  layers: "0", format: "image/jpeg", version: "1.3.0", maxZoom: 20,
  attribution: "ortofoto © ČÚZK"
}).addTo(map);
const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19, attribution: "© OpenStreetMap"
});
const katastr = L.tileLayer.wms("https://services.cuzk.cz/wms/wms.asp", {
  layers: "hranice_parcel,parcelni_cisla", format: "image/png", transparent: true,
  version: "1.3.0", maxZoom: 20, opacity: 0.9, attribution: "katastr © ČÚZK"
});

/* ---------- veškerý majetek SERVEREM (bez stahování 32 MB) ----------
   ArcGIS MapServer renderuje polygony jako obrázek; přes dynamicLayers mu předáme
   vlastní renderer → vykreslí v NAŠICH barvách/průhlednostech. Barva [R,G,B,A],
   A=alfa 0–255 (fill 0.4→102; obrys modrá 0.67→171, ostatní 0.45→115).
   Zdroj = sed/hmp_vlastnictvi_sprava, vrstva 0 (bez měřítkového omezení, kreslí
   i při oddálení - na rozdíl od sed/majetek, jehož skupina má minScale 25000).
   Naše 4 kategorie z polí: vlastnictví TRIDAVL ('Hl.m. Praha'=100 % /
   'Pod…'=Podílnictví s HMP=spoluvlastnictví) × správa TRIDAHO ('M…'=Městské
   části=svěřeno MČ). */
const SFS = (c, oc) => ({ type: "esriSFS", style: "esriSFSSolid", color: c,
  outline: { type: "esriSLS", style: "esriSLSSolid", color: oc, width: 0.4 } });
const ENT = (id, defx, fill, outline) => ({
  id: id, source: { type: "mapLayer", mapLayerId: 0 }, minScale: 0, maxScale: 0,
  definitionExpression: defx, drawingInfo: { renderer: { type: "simple", symbol: SFS(fill, outline) } }
});
const NESV = "(TRIDAHO IS NULL OR TRIDAHO NOT LIKE 'M%')";   // nesvěřeno
const SVER = "TRIDAHO LIKE 'M%'";                            // svěřeno MČ (Městské části…)
const DYN_MAJETEK = encodeURIComponent(JSON.stringify([
  ENT(101, "TRIDAVL LIKE 'Hl.m. Praha%' AND " + NESV, [31, 111, 235, 102], [31, 111, 235, 171]),  // HMP 100 % modrá
  ENT(102, "TRIDAVL LIKE 'Pod%' AND " + NESV, [132, 56, 214, 102], [132, 56, 214, 115]),           // spoluvl. fialová
  ENT(103, "TRIDAVL LIKE 'Hl.m. Praha%' AND " + SVER, [232, 115, 12, 102], [232, 115, 12, 115]),   // svěřeno 100 % oranžová
  ENT(104, "TRIDAVL LIKE 'Pod%' AND " + SVER, [181, 33, 107, 102], [181, 33, 107, 115]),           // svěřeno spoluvl. magenta
]));
/* Majetek státu: služba sed/klasifikace_vlastniku, vrstva 2 (Vlastnické třídy
   pozemků), pole TRIDAVL; třída "ČR..." má v originále červenou #fa3636. */
const DYN_STAT = encodeURIComponent(JSON.stringify([{
  id: 202, source: { type: "mapLayer", mapLayerId: 2 },
  definitionExpression: "TRIDAVL='ČR včetně státem ovládaných subjektů'",
  drawingInfo: { renderer: { type: "simple", symbol: SFS([250, 54, 54, 102], [250, 54, 54, 130]) } },
}]));
const BASE_MAJETEK = "https://gp-dc.iprpraha.cz/arcgis/rest/services/sed/hmp_vlastnictvi_sprava/MapServer";
const BASE_KLASIF = "https://gs-pub.praha.eu/arcgis/rest/services/sed/klasifikace_vlastniku/MapServer";
const EXPORT_MAJETEK = BASE_MAJETEK + "/export";
const EXPORT_KLASIF = BASE_KLASIF + "/export";
// obecná dlaždicová vrstva volající ArcGIS export s předaným rendererem (dynamicLayers).
// dx/dy = pevná korekce request-bboxu v metrech (3857): služby hmp_vlastnictvi_sprava
// i klasifikace_vlastniku mají oproti katastru jinou výchozí datumovou transformaci
// a jsou konstantně posunuté o cca (+8, +13.2) m po celé Praze (změřeno korelací;
// posunem request-bboxu se to srovná na 0). sed/majetek posun nemá (sedí na katastr).
const ArcGISDyn = L.TileLayer.extend({
  getTileUrl: function (coords) {
    const size = this.getTileSize();
    const nw = coords.scaleBy(size), se = nw.add(size);
    const a = L.CRS.EPSG3857.project(map.unproject(nw, coords.z));
    const b = L.CRS.EPSG3857.project(map.unproject(se, coords.z));
    const dx = this.options.dx || 0, dy = this.options.dy || 0;
    const bbox = [Math.min(a.x, b.x) + dx, Math.min(a.y, b.y) + dy,
                  Math.max(a.x, b.x) + dx, Math.max(a.y, b.y) + dy].join(",");
    return this.options.exportUrl + "?f=image&format=png32&transparent=true&bboxSR=3857&imageSR=3857" +
      "&size=" + size.x + "," + size.y + "&bbox=" + bbox + "&dynamicLayers=" + this.options.dyn;
  }
});
const serverLayer = new ArcGISDyn("", { pane: "pSrv", tileSize: 256, maxZoom: 20,
  exportUrl: EXPORT_MAJETEK, dyn: DYN_MAJETEK, dx: 8.0, dy: 13.2,
  attribution: "majetek HMP © IPR / MHMP" });
const serverStat = new ArcGISDyn("", { pane: "pSrv", tileSize: 256, maxZoom: 20,
  exportUrl: EXPORT_KLASIF, dyn: DYN_STAT, dx: 8.0, dy: 13.2,
  attribution: "klasifikace vlastníků © IPR / MHMP" });

/* ---------- identify po kliknutí (serverové rastrové vrstvy nemají hover tooltip) ----------
   Když běží serverová vrstva, kliknutí dotáže službu bodovým query (CORS je povolený)
   a ukáže popup s vlastnictvím parcely. U státní služby se bod posouvá stejnou korekcí
   (+8, +13.2) jako render, aby identify seděl na to, co je vidět. */
function queryBod(base, layerIds, x, y, fields) {
  let i = 0;
  const step = () => {
    if (i >= layerIds.length) return Promise.resolve(null);
    const lid = layerIds[i++];
    const url = base + "/" + lid + "/query?f=json&returnGeometry=false" +
      "&spatialRel=esriSpatialRelIntersects&geometryType=esriGeometryPoint&inSR=3857" +
      "&geometry=" + x + "," + y + "&outFields=" + encodeURIComponent(fields.join(","));
    return fetch(url).then(r => r.json())
      .then(d => { const f = (d.features || [])[0]; return f ? { layerId: lid, a: f.attributes } : step(); })
      .catch(() => step());
  };
  return step();
}
function popupHMP(a) {
  const spolu = /^Pod/.test(a.TRIDAVL || "");   // Podílnictví = spoluvlastnictví
  const svereno = /^M/.test(a.TRIDAHO || "");    // Městské části = svěřeno MČ
  const kat = (svereno ? "svěřeno MČ" : "hl. m. Praha") + (spolu ? " – spoluvlastnictví" : " – 100 %");
  return "<b>parc. č. " + (a.PARCELA || "?") + "</b><br>" + kat +
    "<br><span class='muted'>k.ú.: " + (a.KATASTR || "?") + "</span>";
}
function popupStat(a) {
  return "<b>parc. č. " + (a.PARCELA || "?") + "</b><br>majetek státu (ČR)" +
    "<br><span class='muted'>třída: " + (a.TRIDAVL || "?") + (a.KATASTR ? "<br>k.ú.: " + a.KATASTR : "") + "</span>";
}
map.on("click", function (e) {
  const hmp = map.hasLayer(serverLayer), stat = map.hasLayer(serverStat);
  if (!hmp && !stat) return;   // identify jen když běží serverová vrstva
  const p = L.CRS.EPSG3857.project(e.latlng);
  const jobs = [];
  if (hmp) jobs.push(queryBod(BASE_MAJETEK, [0], p.x + 8.0, p.y + 13.2,
    ["PARCELA", "KATASTR", "TRIDAVL", "TRIDAHO"])
    .then(r => (r && /^(Hl\.m\. Praha|Pod)/.test(r.a.TRIDAVL || "")) ? popupHMP(r.a) : ""));
  if (stat) jobs.push(queryBod(BASE_KLASIF, [2], p.x + 8.0, p.y + 13.2, ["PARCELA", "TRIDAVL", "KATASTR"])
    .then(r => (r && /^ČR/.test(r.a.TRIDAVL || "")) ? popupStat(r.a) : ""));   // jen skutečně státní
  Promise.all(jobs).then(parts => {
    const html = parts.filter(Boolean).join("<hr style='margin:6px 0;border:none;border-top:1px solid #ccc'>");
    if (html) L.popup({ maxWidth: 260 }).setLatLng(e.latlng).setContent(html).openOn(map);
  });
});

/* ---------- styly vektorů ---------- */
// per-druh zvýraznění (nad ortofotem jinak nebytové plochy mizí, hlavně zelené)
const STYL_TR = {
  "obytná":      { fillOpacity: 0.28, weight: 1.0, opacity: 0.80 },
  "produkční":   { fillOpacity: 0.30, weight: 1.0, opacity: 0.85 },
  "rekreační":   { fillOpacity: 0.28, weight: 1.0, opacity: 0.82 },
  "přírodní":    { fillOpacity: 0.30, weight: 1.1, opacity: 0.88 },
  "nestanoveno": { fillOpacity: 0.12, weight: 0.6, opacity: 0.45 },
};
function styleTR(f) {
  const v = f.properties.vyuziti;
  const c = BARVA_TR[v] || "#999";
  const s = STYL_TR[v] || { fillOpacity: 0.15, weight: 0.6, opacity: 0.5 };
  return { color: c, weight: s.weight, opacity: s.opacity, fillColor: c, fillOpacity: s.fillOpacity };
}
function barvaParcely(p) {
  const spolu = p.podil < 1;
  if (p.svereno == 1) return spolu ? BARVA_SVERENO_SPOLU : BARVA_SVERENO; // svěřeno: spoluvl. / 100 %
  return spolu ? BARVA_SPOLU : BARVA_VLASTNI;                             // nesvěřeno: spoluvl. / 100 %
}
function styleParcela(f) {
  const c = barvaParcely(f.properties);
  // hranice zeslabena, aby obrys nepřebíjel barvu uvnitř parcely. Modrá (čistě
  // magistrát 100 %) je ok na 0.67; ostatní tři barvy ještě slabší (0.55).
  const opacity = c === BARVA_VLASTNI ? 0.67 : 0.45;
  return { color: c, weight: 0.5, opacity: opacity, fillColor: c, fillOpacity: 0.4 };
}
/* hranice MČ = výrazná barevná čára s bílým lemem (kasingem), aby byla vidět
   univerzálně - jak globálně nad ortofotem, tak po přiblížení nad černými
   katastrálními hranicemi (jinak by černá s černou splynula). */
const styleMC = { color: BARVA_MC, weight: 2.5, opacity: 1, fill: false, dashArray: "7 5", lineCap: "round" };
const styleMCLem = { color: "#ffffff", weight: 5.5, opacity: 0.55, fill: false, lineCap: "round" };

/* ---------- načtení dat ----------
   parClipped = majetek oříznutý na průnik s T/R plochami (data/majetek.geojson).
   Veškerý majetek (mimo režim „jen v T/R") se bere SERVEROVĚ (serverLayer, viz výše) -
   žádný 32MB soubor se nestahuje. */
const trLayer = L.geoJSON(null, { style: styleTR, renderer: rBg, interactive: false });
const parClipped = L.geoJSON(null, { style: styleParcela, renderer: rFg, onEachFeature: onParcela });
const mcLem = L.geoJSON(null, { style: styleMCLem, renderer: rTop, interactive: false });
const mcLine = L.geoJSON(null, { style: styleMC, renderer: rTop, interactive: false });
const mcLayer = L.layerGroup([mcLem, mcLine]);   // lem pod barevnou čárou
const mcBounds = {};   // kod_mc -> L.latLngBounds
/* MPP vrstvy (T/R plochy + omezení pozemků jen na T/R) jsou implicitně vypnuté;
   zapnou se URL parametrem ?TRplochy (např. ?TRplochy nebo ?TRplochy=1). */
const _trParam = new URLSearchParams(location.search).get("TRplochy");
const mppOn = _trParam !== null && _trParam !== "0" && _trParam.toLowerCase() !== "false";

function fmt(n) { return (n == null) ? "?" : n.toLocaleString("cs-CZ"); }
function onParcela(f, layer) {
  const p = f.properties;
  const podil = p.podil < 1 ? " (spoluvlastnictví, podíl " + p.podil + ")" : "";
  const sver = p.svereno == 1 ? "ano" : "ne";
  layer.bindTooltip(
    "<b>parc. č. " + (p.parcela || "?") + "</b>" + podil +
    "<br>k.ú. kód: " + (p.ku || "?") +
    "<br>výměra: " + fmt(p.vymera) + " m²" +
    "<br>svěřeno MČ: " + sver +
    "<br><span class='muted'>" + (p.nazev_mc || "") + "</span>",
    { className: "parc", sticky: true });
}

Promise.all([
  fetch("data/tr.geojson").then(r => r.json()),
  fetch("data/majetek.geojson").then(r => r.json()),
  fetch("data/mc.geojson").then(r => r.json())
]).then(([tr, maj, mc]) => {
  trLayer.addData(tr);
  if (mppOn) trLayer.addTo(map);   // T/R plochy implicitně vypnuté (viz mppOn / ?TRplochy)
  parClipped.addData(maj);
  mcLem.addData(mc);
  mcLine.addData(mc);
  mcLayer.addTo(map);
  mcLine.eachLayer(l => { mcBounds[l.feature.properties.kod_mc] = l.getBounds(); });
  buildControls(mc);
  updateParcely();       // výchozí zobrazení pozemků dle stavu přepínačů
  map.fitBounds(mcLine.getBounds());
}).catch(e => alert("Chyba načtení dat: " + e));

/* ---------- logika zobrazení pozemků ----------
   "Pozemky města" = hlavní přepínač, zda pozemky vůbec kreslit.
   "Pozemky jen v T/R" (jen v režimu MPP) = oříznutý vektor (parClipped) vs. veškerý
   majetek. Veškerý majetek se kreslí SERVEROVĚ (serverLayer) - žádný 32MB soubor. */
const stav = { pozemky: true, jenTR: mppOn };
function setLayer(layer, on) {
  if (on && !map.hasLayer(layer)) map.addLayer(layer);
  else if (!on && map.hasLayer(layer)) map.removeLayer(layer);
}
function updateParcely() {
  setLayer(parClipped, stav.pozemky && stav.jenTR);
  setLayer(serverLayer, stav.pozemky && !stav.jenTR);
}

/* ---------- schovávací panel (dock) ----------
   Malý pásek (tab) + tělo, rozbaluje se SVISLE. side="top": tab nahoře, tělo
   pod ním (roluje dolů z pravého horního rohu). side="bottom": tělo nahoře, tab
   dole (roluje nahoru z pravého dolního rohu). Kliknutím na pásek se tělo
   skryje/ukáže - šetří místo hlavně na mobilu. */
function makeDock(position, side, label, startCollapsed) {
  const out = {};
  const ctrl = L.control({ position });
  ctrl.onAdd = function () {
    const dock = L.DomUtil.create("div", "dock dock-" + side);
    if (startCollapsed) dock.classList.add("collapsed");
    const tab = L.DomUtil.create("button", "dock-tab");
    tab.type = "button";
    tab.title = "Skrýt / zobrazit panel";
    tab.innerHTML = "<span class='ar'></span>" + (label ? "<span>" + label + "</span>" : "");
    const body = L.DomUtil.create("div", "dock-body panel");
    dock.appendChild(body);   // tělo nahoře, pásek pod ním (viz CSS komentář)
    dock.appendChild(tab);
    tab.addEventListener("click", function () { dock.classList.toggle("collapsed"); });
    L.DomEvent.disableClickPropagation(dock);
    L.DomEvent.disableScrollPropagation(dock);
    out.dock = dock; out.body = body;
    return dock;
  };
  ctrl.addTo(map);
  return out;
}

/* ---------- ovládací panel: výběr MČ (nahoře) + přepínače vrstev ---------- */
function buildControls(mc) {
  /* číslované MČ (Praha 1..22) napřed a podle čísla, ostatní za nimi abecedně */
  const feats = mc.features.slice().sort((a, b) => {
    const na = a.properties.nazev_mc, nb = b.properties.nazev_mc;
    const ma = na.match(/^Praha (\d+)$/), mb = nb.match(/^Praha (\d+)$/);
    if (ma && mb) return (+ma[1]) - (+mb[1]);
    if (ma) return -1;
    if (mb) return 1;
    return na.localeCompare(nb, "cs");
  });
  const dk = makeDock("topright", "top", "", false);   // dolů z pravého horního rohu, na začátku vysunuté
  dk.body.classList.add("controls");
  dk.body.innerHTML =
    "<h1>Pozemky města v rozvojových plochách</h1>" +
    "<label for='mc-select'>Přejít na městskou část:</label>" +
    "<select id='mc-select'><option value=''>Celá Praha</option>" +
    feats.map(f => "<option value='" + f.properties.kod_mc + "'>" + f.properties.nazev_mc + "</option>").join("") +
    "</select>" +
    "<hr>" +
    "<label><input type='radio' name='base' id='b-orto' checked> Ortofoto (ČÚZK)</label>" +
    "<label><input type='radio' name='base' id='b-osm'> Mapa (OSM)</label>" +
    "<hr>" +
    "<label><input type='checkbox' id='l-kat'> Katastr</label>" +
    "<label><input type='checkbox' id='l-mc' checked> Hranice MČ</label>" +
    "<label><input type='checkbox' id='l-poz' checked> Pozemky města</label>" +
    "<label><input type='checkbox' id='l-stat'> Majetek státu (ČR)</label>" +
    "<hr class='sep'>" +
    "<label><input type='checkbox' id='l-tr'" + (mppOn ? " checked" : "") + "> T/R plochy (MPP)</label>" +
    "<label><input type='checkbox' id='l-jentr'" + (mppOn ? " checked" : "") + "> Pozemky jen v T/R</label>";
  const $ = id => document.getElementById(id);
  $("mc-select").addEventListener("change", function () {
    const v = this.value;
    if (v && mcBounds[v]) map.fitBounds(mcBounds[v]);
    else map.fitBounds(mcLine.getBounds());
  });
  $("b-orto").addEventListener("change", function () { if (this.checked) { map.removeLayer(osm); ortofoto.addTo(map); } });
  $("b-osm").addEventListener("change", function () { if (this.checked) { map.removeLayer(ortofoto); osm.addTo(map); } });
  $("l-kat").addEventListener("change", function () { this.checked ? katastr.addTo(map) : map.removeLayer(katastr); });
  $("l-mc").addEventListener("change", function () { this.checked ? mcLayer.addTo(map) : map.removeLayer(mcLayer); });
  $("l-tr").addEventListener("change", function () { this.checked ? trLayer.addTo(map) : map.removeLayer(trLayer); });
  $("l-poz").addEventListener("change", function () { stav.pozemky = this.checked; updateParcely(); });
  $("l-jentr").addEventListener("change", function () { stav.jenTR = this.checked; updateParcely(); });
  $("l-stat").addEventListener("change", function () { setLayer(serverStat, this.checked); });
  return dk.dock;
}

/* ---------- legenda (schovávací) ---------- */

/* ---------- tlačítko „moje poloha" (pod zoomem vlevo nahoře) ---------- */
let locMarker = null;
function locateMe(btn) {
  if (!navigator.geolocation) { alert("Geolokace není v tomto prohlížeči dostupná."); return; }
  if (btn) btn.classList.add("locating");
  navigator.geolocation.getCurrentPosition(
    function (pos) {
      if (btn) btn.classList.remove("locating");
      const ll = [pos.coords.latitude, pos.coords.longitude];
      map.setView(ll, Math.max(map.getZoom(), 16));
      if (locMarker) locMarker.setLatLng(ll);
      else locMarker = L.circleMarker(ll, { pane: "pTop", radius: 7, color: "#ffffff", weight: 2,
        fillColor: "#1a5fb4", fillOpacity: 0.9 }).addTo(map).bindTooltip("Moje poloha");
    },
    function (err) {
      if (btn) btn.classList.remove("locating");
      alert("Polohu se nepodařilo zjistit: " + err.message);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}
const locateCtrl = L.control({ position: "topleft" });   // přidá se pod výchozí zoom
locateCtrl.onAdd = function () {
  const div = L.DomUtil.create("div", "leaflet-bar leaflet-control locate-ctrl");
  const a = L.DomUtil.create("a", "", div);
  a.href = "#"; a.title = "Vycentrovat na moji polohu"; a.setAttribute("role", "button");
  a.innerHTML = "<svg viewBox='0 0 24 24' width='20' height='20' aria-hidden='true'>" +
    "<path d='M21 3 L3 10.53 v.98 l6.84 2.65 L12.48 21 h.98 L21 3 z' fill='none' " +
    "stroke='currentColor' stroke-width='1.8' stroke-linejoin='round'/></svg>";
  L.DomEvent.on(a, "click", function (e) { L.DomEvent.stop(e); locateMe(a); });
  L.DomEvent.disableClickPropagation(div);
  return div;
};
locateCtrl.addTo(map);
</script>
