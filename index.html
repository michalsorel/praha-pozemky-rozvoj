<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pozemky města v rozvojových plochách</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #map { position: absolute; inset: 0; }
  .panel {
    background: rgba(255,255,255,0.94); padding: 10px 12px; border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.3); font-size: 13px; color: #111; line-height: 1.35;
  }
  .panel h1 { font-size: 14px; margin: 0 0 6px; }
  .panel select { width: 100%; padding: 4px; font-size: 13px; margin-top: 4px; }
  .legend i { display: inline-block; width: 14px; height: 14px; margin-right: 6px; vertical-align: -2px; border: 1px solid rgba(0,0,0,0.35); }
  .legend div { margin: 3px 0; }
  .muted { color: #555; font-size: 12px; }
  .leaflet-tooltip.parc { font-size: 12px; line-height: 1.3; }
  a { color: #1a5fb4; }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
/* ---------- barvy ---------- */
const BARVA_TR = { "obytná": "#e06666", "produkční": "#8f8f8f", "rekreační": "#7fbf7f", "přírodní": "#3f8f5f", "nestanoveno": "#c9a24b" };
const BARVA_VLASTNI = "#1f6feb";      // nesvěřeno, hl. m. Praha 100 % (modrá)
const BARVA_SPOLU = "#8438d6";        // nesvěřeno, spoluvlastnictví (fialová)
const BARVA_SVERENO = "#e8730c";      // svěřeno MČ, 100 % (oranžová)
const BARVA_SVERENO_SPOLU = "#b5216b"; // svěřeno MČ, spoluvlastnictví (magenta - teplá, k fialové, ale daleko od BARVA_SPOLU i BARVA_MC)
const BARVA_MC = "#ff1f8f";           // hranice MČ (výrazná, univerzální)

const map = L.map("map", { preferCanvas: true }).setView([50.08, 14.44], 11);

/* Pořadí vrstev řešíme panes (funguje i při pozdějším líném načtení kontextu):
   pozadí (T/R plochy + kontext veškerý majetek) < průnik s T/R (sytě) < hranice MČ.
   Nepodkladové panes s pointer-events:none nechají klikat skrz na interaktivní. */
[["pBg", 410, true], ["pFg", 420, false], ["pTop", 430, true]].forEach(([n, z, noEvt]) => {
  map.createPane(n);
  map.getPane(n).style.zIndex = z;
  if (noEvt) map.getPane(n).style.pointerEvents = "none";
});
const rBg = L.canvas({ pane: "pBg", padding: 0.5 });   // T/R + kontext (neinteraktivní)
const rFg = L.canvas({ pane: "pFg", padding: 0.5 });   // majetek v T/R (interaktivní)
const rTop = L.canvas({ pane: "pTop", padding: 0.5 }); // hranice MČ

/* ---------- podklady ---------- */
const ortofoto = L.tileLayer.wms("https://ags.cuzk.cz/arcgis1/services/ORTOFOTO/MapServer/WMSServer", {
  layers: "0", format: "image/jpeg", version: "1.3.0", maxZoom: 20,
  attribution: "ortofoto © ČÚZK"
}).addTo(map);
const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19, attribution: "© OpenStreetMap"
});
const katastr = L.tileLayer.wms("https://services.cuzk.cz/wms/wms.asp", {
  layers: "hranice_parcel,parcelni_cisla", format: "image/png", transparent: true,
  version: "1.3.0", maxZoom: 20, opacity: 0.9, attribution: "katastr © ČÚZK"
});

/* ---------- styly vektorů ---------- */
function styleTR(f) {
  const v = f.properties.vyuziti;
  const c = BARVA_TR[v] || "#999";
  const ob = v === "obytná";   // obytné mírně zvýraznit (jinak proti pozadí mizí)
  return { color: c, weight: ob ? 1 : 0.6, opacity: ob ? 0.8 : 0.45,
           fillColor: c, fillOpacity: ob ? 0.28 : 0.12 };
}
function barvaParcely(p) {
  const spolu = p.podil < 1;
  if (p.svereno == 1) return spolu ? BARVA_SVERENO_SPOLU : BARVA_SVERENO; // svěřeno: spoluvl. / 100 %
  return spolu ? BARVA_SPOLU : BARVA_VLASTNI;                             // nesvěřeno: spoluvl. / 100 %
}
function styleParcela(f) {
  const c = barvaParcely(f.properties);
  return { color: c, weight: 1, opacity: 0.95, fillColor: c, fillOpacity: 0.4 };
}
/* kontext = veškerý majetek (i mimo T/R), stejné barvy ale zeslabené */
function styleVse(f) {
  const c = barvaParcely(f.properties);
  return { color: c, weight: 0.4, opacity: 0.5, fillColor: c, fillOpacity: 0.14 };
}
/* hranice MČ = výrazná barevná čára s bílým lemem (kasingem), aby byla vidět
   univerzálně - jak globálně nad ortofotem, tak po přiblížení nad černými
   katastrálními hranicemi (jinak by černá s černou splynula). */
const styleMC = { color: BARVA_MC, weight: 2.5, opacity: 1, fill: false, dashArray: "7 5", lineCap: "round" };
const styleMCLem = { color: "#ffffff", weight: 5.5, opacity: 0.55, fill: false, lineCap: "round" };

/* ---------- načtení dat ---------- */
const trLayer = L.geoJSON(null, { style: styleTR, renderer: rBg, interactive: false });
const vseLayer = L.geoJSON(null, { style: styleVse, renderer: rBg, interactive: false }); // kontext, líně
const parLayer = L.geoJSON(null, { style: styleParcela, renderer: rFg, onEachFeature: onParcela });
const mcLem = L.geoJSON(null, { style: styleMCLem, renderer: rTop, interactive: false });
const mcLine = L.geoJSON(null, { style: styleMC, renderer: rTop, interactive: false });
const mcLayer = L.layerGroup([mcLem, mcLine]);   // lem pod barevnou čárou
const mcBounds = {};   // kod_mc -> L.latLngBounds
let vseLoaded = false;   // veškerý majetek se stáhne až při prvním zapnutí (32 MB)

function fmt(n) { return (n == null) ? "?" : n.toLocaleString("cs-CZ"); }
function onParcela(f, layer) {
  const p = f.properties;
  const podil = p.podil < 1 ? " (spoluvlastnictví, podíl " + p.podil + ")" : "";
  const sver = p.svereno == 1 ? "ano" : "ne";
  layer.bindTooltip(
    "<b>parc. č. " + (p.parcela || "?") + "</b>" + podil +
    "<br>k.ú. kód: " + (p.ku || "?") +
    "<br>výměra: " + fmt(p.vymera) + " m²" +
    "<br>svěřeno MČ: " + sver +
    "<br><span class='muted'>" + (p.nazev_mc || "") + "</span>",
    { className: "parc", sticky: true });
}

Promise.all([
  fetch("data/tr.geojson").then(r => r.json()),
  fetch("data/majetek.geojson").then(r => r.json()),
  fetch("data/mc.geojson").then(r => r.json())
]).then(([tr, maj, mc]) => {
  trLayer.addData(tr).addTo(map);
  parLayer.addData(maj).addTo(map);
  mcLem.addData(mc);
  mcLine.addData(mc);
  mcLayer.addTo(map);
  mcLine.eachLayer(l => { mcBounds[l.feature.properties.kod_mc] = l.getBounds(); });
  buildSelect(mc);
  map.fitBounds(mcLine.getBounds());
}).catch(e => alert("Chyba načtení dat: " + e));

/* ---------- ovládání vrstev ---------- */
L.control.layers(
  { "Ortofoto (ČÚZK)": ortofoto, "Mapa (OSM)": osm },
  { "Katastr – hranice + čísla (ČÚZK)": katastr,
    "T/R plochy (MPP)": trLayer,
    "Pozemky města v T/R": parLayer,
    "Veškerý majetek města (i mimo T/R)": vseLayer,
    "Hranice MČ": mcLayer },
  { collapsed: false }
).addTo(map);

/* líné načtení kontextové vrstvy (velký soubor) až při prvním zapnutí */
map.on("overlayadd", function (e) {
  if (e.layer === vseLayer && !vseLoaded) {
    vseLoaded = true;
    fetch("data/vsechen_majetek.geojson").then(r => r.json())
      .then(d => vseLayer.addData(d))
      .catch(err => { vseLoaded = false; alert("Chyba načtení veškerého majetku: " + err); });
  }
});

/* ---------- výběr MČ ---------- */
function buildSelect(mc) {
  const feats = mc.features.slice().sort((a, b) => a.properties.nazev_mc.localeCompare(b.properties.nazev_mc, "cs"));
  const ctrl = L.control({ position: "topleft" });
  ctrl.onAdd = function () {
    const d = L.DomUtil.create("div", "panel");
    d.innerHTML = "<h1>Pozemky města v rozvojových plochách</h1>" +
      "<label>Přejít na městskou část:</label>" +
      "<select id='mc-select'><option value=''>Celá Praha</option>" +
      feats.map(f => "<option value='" + f.properties.kod_mc + "'>" + f.properties.nazev_mc + "</option>").join("") +
      "</select>";
    L.DomEvent.disableClickPropagation(d);
    L.DomEvent.disableScrollPropagation(d);
    return d;
  };
  ctrl.addTo(map);
  document.getElementById("mc-select").addEventListener("change", function () {
    const v = this.value;
    if (v && mcBounds[v]) map.fitBounds(mcBounds[v]);
    else map.fitBounds(mcLine.getBounds());
  });
}

/* ---------- legenda ---------- */
const legend = L.control({ position: "bottomright" });
legend.onAdd = function () {
  const d = L.DomUtil.create("div", "panel legend");
  d.innerHTML =
    "<div><b>Pozemky v majetku města</b></div>" +
    "<div><i style='background:" + BARVA_VLASTNI + "'></i>hl. m. Praha 100 %</div>" +
    "<div><i style='background:" + BARVA_SPOLU + "'></i>hl. m. Praha – spoluvlastnictví</div>" +
    "<div><i style='background:" + BARVA_SVERENO + "'></i>svěřeno MČ – 100 %</div>" +
    "<div><i style='background:" + BARVA_SVERENO_SPOLU + "'></i>svěřeno MČ – spoluvlastnictví</div>" +
    "<div style='margin-top:6px'><b>Hranice</b></div>" +
    "<div><i style='background:" + BARVA_MC + "'></i>městská část</div>" +
    "<div style='margin-top:6px'><b>T/R plochy (MPP)</b></div>" +
    "<div><i style='background:" + BARVA_TR["obytná"] + "'></i>obytná</div>" +
    "<div><i style='background:" + BARVA_TR["produkční"] + "'></i>produkční</div>" +
    "<div><i style='background:" + BARVA_TR["rekreační"] + "'></i>rekreační</div>" +
    "<div><i style='background:" + BARVA_TR["přírodní"] + "'></i>přírodní <span class='muted'>(obytná zvýrazněna)</span></div>" +
    "<div class='muted' style='margin-top:6px;max-width:220px'>Sytě = majetek <b>oříznutý na T/R plochy</b> (skutečný průnik). Zeslabeně (volitelná vrstva) = <b>veškerý majetek města</b> i mimo T/R. Nejde o rozlišení, zda je pozemek volný pro vybavenost.</div>";
  return d;
};
legend.addTo(map);
</script>
</body>
</html>
